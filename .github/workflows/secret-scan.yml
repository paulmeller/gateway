name: Secret scan

# Defense-in-depth against ever re-committing credentials.
# Runs on every PR and push; a finding fails the job.
#
# History note: pre-0.3.1 tags contained committed SQLite DBs with
# plaintext vault entries. All keys were rotated and history was
# rewritten in April 2026. This scan exists so that can't happen again.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly drift check — catches anything committed directly on main
    # by a human who forgot to go through a PR.
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Scan the full history, not just the latest commit, so someone
          # can't slip a secret in on a feature branch and land it via PR.
          fetch-depth: 0
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown
        # Using trufflehog (not gitleaks-action) because gitleaks-action v2
        # requires a paid license for GitHub organization repos. Trufflehog
        # is free and open source for this use case.
